app = "gll-checkout-craft"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpus = 1

[env]
  CRAFT_ENVIRONMENT = "production"
  CRAFT_DEV_MODE = false
  CRAFT_ALLOW_ADMIN_CHANGES = false
  CRAFT_DB_SERVER = "gll-checkout-postgres.flycast"
  TIGRIS_BUCKET = "fragrant-star-2324"
  TIGRIS_ENDPOINT = "https://fly.storage.tigris.dev"
  TIGRIS_ACCESS_KEY_ID = "tid_gEtbxFPSAGYgs_aVWdzoJGvE_QhqNccXVLEKdIsIZTuoTFENob"
  PHP_OPCACHE_VALIDATE_TIMESTAMPS = 1
